<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Join Group — Drink Watch</title>
  <meta name="description" content="You've been invited to a Drink Watch group. Download the app to join.">
  <meta property="og:title" content="Join a Drink Watch Group">
  <meta property="og:description" content="Track drinks with friends. Tap to join the group.">
  <meta property="og:type" content="website">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1A0B2E;
      color: #fff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      max-width: 400px;
      width: 100%;
      text-align: center;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 20px;
      padding: 48px 32px;
    }
    .emoji { font-size: 64px; margin-bottom: 16px; }
    h1 {
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 8px;
    }
    .subtitle {
      font-size: 16px;
      color: rgba(255,255,255,0.6);
      margin-bottom: 32px;
      line-height: 1.5;
    }
    .code-box {
      background: rgba(139,92,246,0.15);
      border: 1px solid rgba(139,92,246,0.3);
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 32px;
    }
    .code-label {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: rgba(255,255,255,0.5);
      margin-bottom: 8px;
    }
    .code-value {
      font-size: 32px;
      font-weight: 700;
      letter-spacing: 8px;
      color: #8B5CF6;
    }
    .download-btn {
      display: block;
      width: 100%;
      padding: 16px;
      border-radius: 12px;
      font-size: 18px;
      font-weight: 700;
      color: #fff;
      text-decoration: none;
      margin-bottom: 12px;
      transition: opacity 0.2s;
    }
    .download-btn:hover { opacity: 0.85; }
    .ios-btn {
      background: linear-gradient(135deg, #FF2D8B, #FF6B35);
    }
    .android-btn {
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.2);
    }
    .instructions {
      margin-top: 24px;
      font-size: 14px;
      color: rgba(255,255,255,0.4);
      line-height: 1.6;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="emoji">🍻</div>
    <h1>You're Invited!</h1>
    <p class="subtitle">Someone invited you to join their group on Drink Watch</p>

    <div class="code-box">
      <div class="code-label">Invite Code</div>
      <div class="code-value" id="invite-code">------</div>
    </div>

    <a class="download-btn ios-btn" id="ios-link" href="#">Download for iOS</a>
    <a class="download-btn android-btn" id="android-link" href="#">Download for Android</a>

    <p class="instructions">
      Open the app, go to Groups, tap "Join Group", and enter the code above.
    </p>
  </div>

  <script>
    (function() {
      var match = window.location.pathname.match(/\/join\/([A-Za-z0-9]{6})/);
      var code = match ? match[1].toUpperCase() : '';
      if (code) {
        document.getElementById('invite-code').textContent = code;
      }

      // TODO: Replace with actual App Store / Play Store URLs after submission
      var IOS_STORE_URL = 'https://apps.apple.com/app/drink-watch/id000000000';
      var ANDROID_STORE_URL = 'https://play.google.com/store/apps/details?id=com.drinkwatch.app';

      document.getElementById('ios-link').href = IOS_STORE_URL;
      document.getElementById('android-link').href = ANDROID_STORE_URL;
    })();
  </script>
</body>
</html>
